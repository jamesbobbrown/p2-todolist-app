<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head (titulo='Registered users')"></head>
<body>

<div th:replace="fragments :: menu"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col">
            <h2>Registered users</h2>
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Id</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.id}"></td>
                    <td th:text="${usuario.email}"></td>
                    <td>
                        <a class="btn btn-primary btn-sm"
                           th:href="@{/registered/{id}(id=${usuario.id})}">view</a>

                        <form th:if="${!usuario.bloqueado}" method="post"
                              th:action="@{/registered/{id}/bloquear(id=${usuario.id})}"
                              style="display:inline-block;">
                            <button type="submit" class="btn btn-danger btn-sm">disable</button>
                        </form>

                        <form th:if="${usuario.bloqueado}" method="post"
                              th:action="@{/registered/{id}/desbloquear(id=${usuario.id})}"
                              style="display:inline-block;">
                            <button type="submit" class="btn btn-success btn-sm">enable</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="fragments :: javascript"></div>
</body>
</html>
