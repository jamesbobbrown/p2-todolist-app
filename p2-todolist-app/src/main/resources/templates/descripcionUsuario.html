<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head (titulo='User description')"></head>
<body>

<div th:replace="fragments :: menu"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col">
            <h2>User description</h2>

            <table class="table table-striped" th:if="${usuario != null}">
                <tbody>
                <tr>
                    <th>Id</th>
                    <td th:text="${usuario.id}"></td>
                </tr>
                <tr>
                    <th>Name</th>
                    <td th:text="${usuario.nombre}"></td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td th:text="${usuario.email}"></td>
                </tr>
                <tr>
                    <th>Date of birth</th>
                    <td th:text="${usuario.fechaNacimiento}"></td>
                </tr>
                </tbody>
            </table>

            <div class="alert alert-warning" th:if="${usuario == null}">
                User not found
            </div>

            <a class="btn btn-secondary" href="/registered">Back to users list</a>
        </div>
    </div>
</div>

<div th:replace="fragments :: javascript"></div>
</body>
</html>
